<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Nicolas ✋✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // CONFIGURATION SIMPLIFIÉE (SANS FIREBASE POUR ÉVITER L'ERREUR)
        const CLAUDE_KEY = "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";
        const GEMINI_KEY = "AIzaSyAsyPgxbxUMoiY3WmZKH7Fqhh7i5QtfaZU";

        async function generateContent() {
            const topic = document.getElementById('topic').value;
            const category = document.getElementById('category').value;
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            
            if(!topic) return alert("Précise un sujet Nicolas !");
            
            status.innerHTML = "✨ Claude rédige votre post...";
            resultArea.classList.remove('hidden');

            try {
                // GÉNÉRATION TEXTE
                const textRes = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': CLAUDE_KEY,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        'dangerously-allow-the-developer-to-implicitly-enable-unsafe-features': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 1000,
                        messages: [{role: "user", content: `Tu es un expert magnétiseur. Écris un post Facebook captivant sur : ${topic}. Catégorie : ${category}. Utilise des emojis et un ton spirituel.`}]
                    })
                });
                const textData = await textRes.json();
                document.getElementById('outputText').innerText = textData.content[0].text;

                status.innerHTML = "✅ Post généré avec succès !";
            } catch (e) {
                status.innerHTML = "❌ Erreur de connexion avec Claude.";
            }
        }
    </script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-indigo-700 mb-8">Générateur Nicolas ✋✨</h1>
        
        <div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
            <input type="text" id="topic" placeholder="Sujet (ex: Le magnétisme et le stress)" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <select id="category" class="w-full p-4 border rounded-xl mb-6">
                <option>Soin à distance</option>
                <option>Nettoyage de lieu</option>
                <option>Rééquilibrage énergétique</option>
            </select>
            <button onclick="generateContent()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700">GÉNÉRER MON POST</button>
            <p id="status" class="text-center mt-4 text-sm font-medium text-indigo-500"></p>
        </div>

        <div id="resultArea" class="hidden bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="font-bold mb-4 border-b pb-2">Votre publication :</h2>
            <div id="outputText" class="whitespace-pre-wrap text-gray-700 italic"></div>
            <button onclick="navigator.clipboard.writeText(document.getElementById('outputText').innerText); alert('Copié !')" class="mt-4 text-sm text-indigo-600 font-bold">📋 Copier le texte</button>
        </div>
    </div>
</body>
</html>
