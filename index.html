<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Nicolas ✨ Claude</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        async function genererClaude() {
            const sujet = document.getElementById('sujet').value;
            const btn = document.getElementById('btn');
            const resultArea = document.getElementById('resultArea');
            const texte = document.getElementById('texte');
            
            if(!sujet) return alert("Indique un sujet, Nicolas !");
            
            btn.innerText = "✨ Claude rédige votre post...";
            btn.disabled = true;
            resultArea.classList.add('hidden');

            try {
                // Ta clé Claude active
                const MA_CLE = "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";
                
                // Le tunnel pour éviter les blocages
                const url = "https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages");

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'x-api-key': MA_CLE,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 1024,
                        messages: [{
                            role: "user", 
                            content: `Tu es Nicolas, un expert magnétiseur énergéticien. Écris un post Facebook captivant, bienveillant et spirituel sur : ${sujet}. Utilise des emojis et un ton professionnel.`
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.content && data.content[0]) {
                    texte.innerText = data.content[0].text;
                    resultArea.classList.remove('hidden');
                    btn.innerText = "GÉNÉRER AVEC CLAUDE ✨";
                } else {
                    alert("Claude a reçu la demande mais n'a pas pu répondre. Vérifie tes crédits sur Anthropic.");
                }
                btn.disabled = false;
            } catch (e) {
                alert("Erreur de connexion. Réessaie dans une minute.");
                btn.innerText = "RÉESSAYER";
                btn.disabled = false;
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-slate-200 min-h-screen p-4 flex items-center justify-center">
    <div class="max-w-xl w-full bg-white p-8 rounded-[2rem] shadow-2xl border-t-8 border-indigo-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-800 font-serif mb-2">Générateur Nicolas ✋✨</h1>
            <p class="text-indigo-500 font-medium italic">La plume de Claude pour ton énergie</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Ton sujet du jour :</label>
                <textarea id="sujet" placeholder="Ex: Pourquoi faire un soin énergétique au printemps ?" 
                    class="w-full p-5 border-2 border-slate-100 rounded-2xl h-32 focus:border-indigo-400 focus:ring-0 outline-none transition-all bg-slate-50 text-gray-700 leading-relaxed"></textarea>
            </div>
            
            <button id="btn" onclick="genererClaude()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95 uppercase tracking-wider">
                GÉNÉRER AVEC CLAUDE ✨
            </button>
        </div>
        
        <div id="resultArea" class="hidden mt-10 p-6 bg-indigo-50 rounded-3xl border-2 border-indigo-100 animate-in fade-in duration-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-indigo-900 underline decoration-indigo-300">Ta publication suggérée :</h2>
                <button onclick="navigator.clipboard.writeText(document.getElementById('texte').innerText); alert('Copié !')" class="text-xs bg-white px-3 py-1 rounded-full border border-indigo-200 text-indigo-600 font-bold hover:bg-indigo-600 hover:text-white transition">COPIER</button>
            </div>
            <p id="texte" class="whitespace-pre-wrap text-gray-700 leading-relaxed italic"></p>
        </div>
    </div>
</body>
</html>
