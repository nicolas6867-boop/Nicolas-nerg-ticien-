<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Nicolas - Magnétiseur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyB9AnEyKRsDFBKVgIApEQ0178O_8mcIbJU",
            authDomain: "generateur-magnetiseur.firebaseapp.com",
            projectId: "generateur-magnetiseur",
            storageBucket: "generateur-magnetiseur.firebasestorage.app",
            messagingSenderId: "1093609918645",
            appId: "1:1093609918645:web:f9e147ebc918fc63d02efc"
        };
        const CLAUDE_KEY = "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";
        const GEMINI_KEY = "AIzaSyAsyPgxbxUMoiY3WmZKH7Fqhh7i5QtfaZU";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.generateContent = async () => {
            const topic = document.getElementById('topic').value;
            const category = document.getElementById('category').value;
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            
            if(!topic) return alert("Précise un sujet Nicolas !");
            
            status.innerHTML = "✨ Claude rédige votre texte vibratoire...";
            resultArea.classList.remove('hidden');

            try {
                // 1. GÉNÉRATION TEXTE (CLAUDE)
                const textRes = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': CLAUDE_KEY,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        'dangerously-allow-the-developer-to-implicitly-enable-unsafe-features': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 1000,
                        messages: [{role: "user", content: `Tu es un expert magnétiseur énergéticien. Écris un post Facebook captivant et bienveillant sur : ${topic}. Catégorie : ${category}. Utilise des emojis, un ton professionnel et spirituel.`}]
                    })
                });
                const textData = await textRes.json();
                const generatedText = textData.content[0].text;
                document.getElementById('outputText').innerText = generatedText;

                // 2. GÉNÉRATION IMAGE (GEMINI)
                status.innerHTML = "🎨 Gemini crée votre image énergétique...";
                const imgRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Génère une description d'image artistique et spirituelle pour illustrer ce texte de magnétisme : ${topic}. Style lumineux, zen, énergie.` }] }]
                    })
                });
                // Note: Ici Gemini Flash simule l'image ou donne une suggestion visuelle 
                // pour l'instant (la génération d'image pure demande un endpoint spécifique Vertex)
                document.getElementById('outputImage').innerHTML = `<div class="bg-indigo-100 p-4 rounded text-center text-indigo-800">Image suggérée : Ambiance lumineuse et spirituelle autour du thème ${topic}</div>`;

                // 3. SAUVEGARDE FIREBASE
                await addDoc(collection(db, "posts"), {
                    texte: generatedText,
                    sujet: topic,
                    date: new Date()
                });

                status.innerHTML = "✅ Terminé avec succès !";
            } catch (e) {
                console.error(e);
                status.innerHTML = "❌ Erreur. Vérifie tes crédits sur Claude/Gemini.";
            }
        };

        window.loadHistory = async () => {
            const historyDiv = document.getElementById('historyContent');
            historyDiv.innerHTML = "Chargement...";
            const q = query(collection(db, "posts"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            historyDiv.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                historyDiv.innerHTML += `<div class="p-3 border-b border-gray-200 text-sm"><strong>${data.sujet}</strong><br>${data.texte.substring(0, 100)}...</div>`;
            });
        };
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-indigo-700">Générateur Nicolas ✋✨</h1>
            <p class="text-gray-600 mt-2">Créez vos posts de Magnétiseur en un clic</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-xl mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Sujet de la publication :</label>
            <input type="text" id="topic" placeholder="Ex: Les bienfaits du rééquilibrage énergétique..." class="w-full p-4 border border-gray-200 rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
            
            <label class="block text-sm font-semibold text-gray-700 mb-2">Catégorie :</label>
            <select id="category" class="w-full p-4 border border-gray-200 rounded-xl mb-6">
                <option>Soin à distance</option>
                <option>Nettoyage de lieu</option>
                <option>Rééquilibrage des Chakras</option>
                <option>Soulagement des douleurs</option>
            </select>

            <button onclick="generateContent()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition duration-200 shadow-lg shadow-indigo-200">
                GÉNÉRER MON POST
            </button>
            <p id="status" class="text-center mt-4 text-sm text-indigo-500 font-medium"></p>
        </div>

        <div id="resultArea" class="hidden space-y-6 animate-fade-in">
            <div class="bg-white p-6 rounded-2xl shadow-lg border border-indigo-50">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Votre Texte Claude :</h2>
                <div id="outputText" class="whitespace-pre-wrap text-gray-700 leading-relaxed italic"></div>
            </div>
            <div id="outputImage" class="rounded-2xl overflow-hidden shadow-lg border-4 border-white"></div>
        </div>

        <div class="mt-10 border-t pt-6 text-center">
            <button onclick="loadHistory()" class="text-indigo-600 font-semibold hover:underline">Voir mon historique de posts</button>
            <div id="historyContent" class="mt-4 text-left bg-white rounded-lg"></div>
        </div>
    </div>
</body>
</html>
