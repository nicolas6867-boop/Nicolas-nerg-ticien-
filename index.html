<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Nicolas ✋✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Ta clé Claude
        const CLAUDE_KEY = "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";

        async function generateContent() {
            const topic = document.getElementById('topic').value;
            const category = document.getElementById('category').value;
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            
            if(!topic) return alert("Précise un sujet Nicolas !");
            
            status.innerHTML = "✨ Claude rédige votre post vibratoire...";
            resultArea.classList.remove('hidden');

            try {
                // On utilise un service "CORS Proxy" pour que Claude accepte la connexion
                const proxyUrl = "https://corsproxy.io/?";
                const targetUrl = "https://api.anthropic.com/v1/messages";

                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    method: 'POST',
                    headers: {
                        'x-api-key': CLAUDE_KEY,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 1000,
                        messages: [{
                            role: "user", 
                            content: `Tu es un expert magnétiseur énergéticien renommé. Écris un post Facebook captivant, bienveillant et profond sur le sujet suivant : ${topic}. 
                            Catégorie de l'intervention : ${category}. 
                            Utilise des emojis spirituels, un ton rassurant et professionnel. Termine par une invitation à prendre soin de soi.`
                        }]
                    })
                });
                
                const data = await response.json();
                
                if (data.content && data.content[0]) {
                    document.getElementById('outputText').innerText = data.content[0].text;
                    status.innerHTML = "✅ Post rédigé par Claude !";
                } else {
                    throw new Error("Réponse vide");
                }

            } catch (e) {
                console.error(e);
                status.innerHTML = "❌ Erreur. Vérifie que ta clé Claude est bien active sur le site d'Anthropic.";
            }
        }
    </script>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-2xl mx-auto py-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-800 font-serif">Générateur Nicolas ✋✨</h1>
            <p class="text-gray-600 italic">La puissance de Claude au service de ton énergie</p>
        </div>
        
        <div class="bg-white p-8 rounded-3xl shadow-2xl mb-6">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2 font-serif">De quoi veux-tu parler ?</label>
                <input type="text" id="topic" placeholder="Ex: Soulager les douleurs chroniques..." class="w-full p-4 border-2 border-indigo-50 rounded-2xl outline-none focus:border-indigo-400 transition">
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2 font-serif">Type de soin :</label>
                <select id="category" class="w-full p-4 border-2 border-indigo-50 rounded-2xl bg-slate-50 outline-none">
                    <option>Magnétisme curatif</option>
                    <option>Soin à distance</option>
                    <option>Nettoyage énergétique de lieu</option>
                    <option>Harmonisation des Chakras</option>
                </select>
            </div>
            
            <button onclick="generateContent()" class="w-full bg-indigo-700 text-white font-bold py-5 rounded-2xl hover:bg-indigo-800 transition shadow-lg shadow-indigo-200 uppercase tracking-widest">
                Demander à Claude ✨
            </button>
            <p id="status" class="text-center mt-4 text-sm font-medium text-indigo-500"></p>
        </div>

        <div id="resultArea" class="hidden bg-white p-8 rounded-3xl shadow-2xl border-t-4 border-indigo-700 animate-fade-in">
            <h2 class="font-bold text-xl text-indigo-900 mb-4 font-serif">Ta publication :</h2>
            <div id="outputText" class="whitespace-pre-wrap text-gray-700 leading-relaxed text-lg italic"></div>
            <button onclick="const txt = document.getElementById('outputText').innerText; navigator.clipboard.writeText(txt); alert('Copié dans le presse-papier !')" class="mt-8 flex items-center justify-center w-full py-4 bg-indigo-50 text-indigo-700 rounded-xl font-bold hover:bg-indigo-100 transition border-2 border-indigo-100">
                📋 COPIER LE TEXTE
            </button>
        </div>
    </div>
</body>
</html>
