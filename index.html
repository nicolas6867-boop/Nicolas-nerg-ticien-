index.html <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nicolas · Générateur Facebook Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0f; font-family: 'DM Sans', sans-serif; color: #d8d0e8; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .btn-primary { background: linear-gradient(135deg, #7c4fd4, #b48cff); transition: all 0.3s ease; }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 0 20px rgba(180, 140, 255, 0.4); transform: translateY(-1px); }
        .tab-active { color: #b48cff; border-bottom: 2px solid #b48cff; }
        .spinner { width: 24px; height: 24px; border: 2px solid rgba(180, 140, 255, 0.2); border-top-color: #b48cff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">
<div id="toast" class="fixed top-6 right-6 z-50 glass px-6 py-3 rounded-xl border-green-500/30 text-green-400 hidden animate-bounce">✓ Action effectuée</div>
<div class="max-w-4xl mx-auto px-4 py-12">
    <header class="text-center mb-12 relative">
        <div class="absolute right-0 top-0 hidden md:block">
            <a href="https://business.facebook.com/latest/content_calendar" target="_blank" class="text-[10px] glass px-4 py-2 rounded-full border-[#1877f2]/30 text-[#6aacff] hover:bg-[#1877f2]/10 transition-all">📅 Ouvrir Calendrier Meta</a>
        </div>
        <span class="text-[10px] tracking-[4px] text-[#7c4fd4] uppercase mb-4 block">Nicolas · Magnétiseur à distance</span>
        <h1 class="font-['Cormorant_Garamond'] text-5xl font-light text-[#f0e8ff] mb-4">Générateur de <em class="italic text-[#b48cff] font-semibold">Contenu</em></h1>
    </header>

    <div class="flex border-b border-white/5 mb-8">
        <button onclick="switchTab('gen')" id="tab-gen" class="px-6 py-3 text-sm transition-all tab-active">✨ Générateur</button>
        <button onclick="switchTab('history')" id="tab-history" class="px-6 py-3 text-sm transition-all text-[#6a5e7a]">💾 Historique</button>
    </div>

    <div id="view-gen" class="space-y-8">
        <section><div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="cat-grid"></div></section>
        <section><div class="flex flex-wrap gap-2" id="tone-grid"></div></section>
        <div class="text-center pt-4"><button id="generate-btn" onclick="generateContent()" disabled class="btn-primary px-10 py-4 rounded-xl text-white font-medium disabled:opacity-30">Générer la publication</button></div>
        <div id="loader" class="hidden flex flex-col items-center py-12 space-y-4"><div class="spinner"></div><p class="text-sm text-[#b48cff] animate-pulse">Préparation du contenu...</p></div>

        <div id="result-area" class="hidden space-y-6">
            <div class="flex justify-between items-center glass px-6 py-3 rounded-xl border-[#1877f2]/20">
                <a href="https://business.facebook.com/latest/content_calendar" target="_blank" class="text-xs font-bold text-[#6aacff] hover:underline">Accéder au Calendrier Meta Business →</a>
            </div>
            <div class="glass p-8 rounded-2xl">
                <div class="flex justify-between items-center mb-4"><h3 class="text-[#b48cff] font-medium">📝 Texte</h3><button onclick="copyToClipboard('post-output')" class="text-xs bg-white/5 px-3 py-1 rounded">Copier</button></div>
                <div id="post-output" class="text-sm leading-relaxed whitespace-pre-wrap"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-2xl flex flex-col">
                    <div id="prompt-output" class="text-xs italic text-[#e8d0a0] mb-6 flex-grow"></div>
                    <button id="img-gen-btn" onclick="generateImage()" class="w-full bg-[#c89040] text-black font-bold py-3 rounded-xl">🖼️ Créer l'image IA</button>
                </div>
                <div id="image-result-container" class="glass rounded-2xl flex items-center justify-center min-h-[300px]">
                    <img id="generated-image" class="hidden w-full h-full object-cover rounded-2xl" src="" />
                    <div id="image-loader" class="hidden spinner"></div>
                </div>
            </div>
            <div class="text-center"><button id="save-btn" onclick="saveToCloud()" class="bg-green-500/10 border border-green-500/30 text-green-400 px-10 py-3 rounded-xl">💾 Sauvegarder l'historique</button></div>
        </div>
    </div>
    <div id="view-history" class="hidden space-y-4"><div id="history-list" class="space-y-4"></div></div>
</div>

<script type="module">

    const geminiKey = "VOTRE_CLE_GEMINI";

    // Les fonctions restent les mêmes que précédemment...

</script>
</body>
</html>
