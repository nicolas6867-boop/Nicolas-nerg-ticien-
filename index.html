<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Nicolas ✋✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Ta clé Gemini qui fonctionne tout de suite
        const GEMINI_KEY = "AIzaSyAsyPgxbxUMoiY3WmZKH7Fqhh7i5QtfaZU";

        async function generateContent() {
            const topic = document.getElementById('topic').value;
            const category = document.getElementById('category').value;
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            
            if(!topic) return alert("Précise un sujet Nicolas !");
            
            status.innerHTML = "✨ Gemini rédige votre post vibratoire...";
            resultArea.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tu es un expert magnétiseur énergéticien. Écris un post Facebook captivant, bienveillant et profond sur le sujet suivant : ${topic}. Catégorie : ${category}. Utilise des emojis spirituels et un ton pro.` }] }]
                    })
                });
                
                const data = await response.json();
                const generatedText = data.candidates[0].content.parts[0].text;
                document.getElementById('outputText').innerText = generatedText;
                status.innerHTML = "✅ Post généré avec succès !";

            } catch (e) {
                status.innerHTML = "❌ Erreur de génération. Réessaie dans un instant.";
            }
        }
    </script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-2xl mx-auto py-10">
        <h1 class="text-4xl font-bold text-center text-indigo-800 mb-8 font-serif">Générateur Nicolas ✋✨</h1>
        <div class="bg-white p-8 rounded-3xl shadow-2xl mb-6">
            <input type="text" id="topic" placeholder="Sujet du jour..." class="w-full p-4 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-indigo-400">
            <select id="category" class="w-full p-4 border rounded-2xl mb-6 bg-slate-50">
                <option>Magnétisme curatif</option>
                <option>Soin à distance</option>
                <option>Nettoyage énergétique</option>
            </select>
            <button onclick="generateContent()" class="w-full bg-indigo-700 text-white font-bold py-5 rounded-2xl hover:bg-indigo-800 transition">GÉNÉRER AVEC GEMINI ✨</button>
            <p id="status" class="text-center mt-4 text-sm font-medium text-indigo-500"></p>
        </div>
        <div id="resultArea" class="hidden bg-white p-8 rounded-3xl shadow-2xl">
            <div id="outputText" class="whitespace-pre-wrap text-gray-700 italic text-lg"></div>
        </div>
    </div>
</body>
</html>
