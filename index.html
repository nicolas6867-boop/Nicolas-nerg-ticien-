<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Nicolas ✋✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        async function generateContent() {
            const topic = document.getElementById('topic').value;
            const category = document.getElementById('category').value;
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            const outputText = document.getElementById('outputText');
            
            if(!topic) return alert("Précise un sujet Nicolas !");
            
            status.innerHTML = "✨ Connexion en cours...";
            resultArea.classList.remove('hidden');
            outputText.innerText = "";

            try {
                // Ta clé Gemini (on s'assure qu'elle est bien là)
                const API_KEY = "AIzaSyAsyPgxbxUMoiY3WmZKH7Fqhh7i5QtfaZU";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tu es un expert magnétiseur. Écris un post Facebook captivant sur : ${topic}. Catégorie : ${category}. Utilise des emojis et un ton spirituel.` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    outputText.innerText = data.candidates[0].content.parts[0].text;
                    status.innerHTML = "✅ Ton post est prêt !";
                } else {
                    status.innerHTML = "❌ Problème avec la clé. Vérifie tes accès Google.";
                }
            } catch (e) {
                status.innerHTML = "❌ Erreur réseau. Vérifie ta connexion.";
            }
        }
    </script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-xl mx-auto py-10 text-center">
        <h1 class="text-3xl font-bold text-indigo-700 mb-8">Générateur Nicolas ✋✨</h1>
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-indigo-100 text-left">
            <input type="text" id="topic" placeholder="Sujet (ex: Le magnétisme et le stress)" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <select id="category" class="w-full p-4 border rounded-xl mb-6 bg-slate-50">
                <option>Soin à distance</option>
                <option>Nettoyage de lieu</option>
                <option>Rééquilibrage énergétique</option>
            </select>
            <button onclick="generateContent()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg">GÉNÉRER MON POST</button>
            <p id="status" class="text-center mt-4 text-sm font-medium text-indigo-500"></p>
        </div>
        <div id="resultArea" class="hidden mt-6 bg-white p-6 rounded-3xl shadow-xl text-left border border-green-100">
            <div id="outputText" class="whitespace-pre-wrap text-gray-700 italic"></div>
        </div>
    </div>
</body>
</html>
