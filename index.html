<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Nicolas ✋✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        async function genererClaude() {
            const sujet = document.getElementById('sujet').value;
            const btn = document.getElementById('btn');
            const resultat = document.getElementById('resultat');
            const texte = document.getElementById('texte');
            
            if(!sujet) return alert("Indique un sujet, Nicolas !");
            
            btn.innerText = "✨ Claude rédige votre post...";
            btn.disabled = true;

            try {
                const MA_CLE = "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";
                const url = "https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages");

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'x-api-key': MA_CLE,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 1024,
                        messages: [{
                            role: "user", 
                            content: `Tu es Nicolas, magnétiseur énergéticien. Écris un post Facebook captivant et bienveillant sur : ${sujet}. Utilise des emojis spirituels.`
                        }]
                    })
                });

                const data = await response.json();
                texte.innerText = data.content[0].text;
                resultat.classList.remove('hidden');
                btn.innerText = "GÉNÉRER AVEC CLAUDE ✨";
            } catch (e) {
                alert("Petit bug de connexion, réessaie dans 10 secondes.");
                btn.innerText = "RÉESSAYER";
            }
            btn.disabled = false;
        }
    </script>
</head>
<body class="bg-slate-50 p-6 flex flex-col items-center">
    <div class="max-w-xl w-full bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-indigo-600 mt-10">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-8">Générateur Nicolas ✋✨</h1>
        
        <label class="block text-sm font-bold text-gray-600 mb-2">Quel est le sujet du jour ?</label>
        <textarea id="sujet" placeholder="Ex: Les bienfaits du magnétisme contre la fatigue..." 
            class="w-full p-4 border-2 border-slate-100 rounded-2xl h-32 focus:border-indigo-400 outline-none mb-6 bg-slate-50"></textarea>
        
        <button id="btn" onclick="genererClaude()" 
            class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all uppercase">
            GÉNÉRER AVEC CLAUDE ✨
        </button>

        <div id="resultat" class="hidden mt-10 p-6 bg-indigo-50 rounded-2xl border-2 border-indigo-100">
            <h2 class="font-bold text-indigo-900 mb-4 border-b border-indigo-200 pb-2 text-lg font-serif italic">La plume de Claude :</h2>
            <p id="texte" class="whitespace-pre-wrap text-gray-700 leading-relaxed italic"></p>
            <button onclick="navigator.clipboard.writeText(document.getElementById('texte').innerText); alert('Copié !')" 
                class="mt-6 w-full py-2 bg-white text-indigo-600 rounded-lg font-bold text-sm border border-indigo-200 uppercase">
                📋 Copier le texte
            </button>
        </div>
    </div>
</body>
</html>
